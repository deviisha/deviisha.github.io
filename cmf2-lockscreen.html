<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMF Phone 2 - Lock Screen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
  }

  .phone-frame {
    width: 360px;
    height: 740px;
    background: #0a0a0a;
    border-radius: 44px;
    border: 2.5px solid #d4c98a;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 1px #2a2a2a, 0 30px 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* LOCK SCREEN */
  #lockScreen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 0 24px 0;
    position: absolute;
    top: 0; left: 0;
    z-index: 10;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .lock-top {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .lock-icon {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lock-icon svg {
    width: 22px;
    height: 22px;
    fill: #fff;
    opacity: 0.9;
  }

  .lock-label {
    color: #fff;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.3px;
    opacity: 0.9;
  }

  .pin-dots {
    display: flex;
    gap: 14px;
    margin-top: 18px;
  }

  .pin-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.5);
    background: transparent;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }

  .pin-dot.filled {
    background: #fff;
    border-color: #fff;
    transform: scale(1.1);
  }

  .pin-dot.error {
    border-color: #ff5252;
    background: #ff5252;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* KEYPAD */
  .keypad-wrapper {
    width: 100%;
    padding: 0 28px;
  }

  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    width: 100%;
  }

  .key {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 72px;
    font-size: 26px;
    font-weight: 300;
    color: #fff;
    cursor: pointer;
    user-select: none;
    border-radius: 8px;
    transition: background 0.1s ease, transform 0.08s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .key:active, .key.pressed {
    background: rgba(255,255,255,0.08);
    transform: scale(0.93);
  }

  .key.backspace svg {
    width: 22px;
    height: 22px;
    stroke: #fff;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
  }

  .key.empty { cursor: default; }

  .bottom-bar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 36px 0;
    margin-top: 4px;
  }

  .emergency-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .emergency-btn svg {
    width: 20px;
    height: 20px;
    fill: #fff;
    opacity: 0.8;
  }

  .emergency-btn span {
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
  }

  .home-btn {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .home-btn:active {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.5);
  }

  /* UNLOCK ANIMATION */
  #lockScreen.unlocking {
    opacity: 0;
    transform: scale(1.05);
  }

  /* =================== */
  /* PASSWORD LOCKER */
  /* =================== */
  #lockerScreen {
    width: 100%;
    height: 100%;
    background: #0d0d0d;
    position: absolute;
    top: 0; left: 0;
    display: none;
    flex-direction: column;
    z-index: 5;
  }

  #lockerScreen.visible {
    display: flex;
  }

  .locker-header {
    padding: 48px 24px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .locker-header-icon {
    width: 36px;
    height: 36px;
    background: rgba(212,201,138,0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .locker-header-icon svg {
    width: 18px; height: 18px; fill: #d4c98a;
  }

  .locker-title {
    flex: 1;
  }

  .locker-title h2 {
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.2px;
  }

  .locker-title p {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 1px;
  }

  .add-btn {
    width: 32px;
    height: 32px;
    background: rgba(212,201,138,0.15);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .add-btn:hover { background: rgba(212,201,138,0.25); }
  .add-btn svg { width: 16px; height: 16px; stroke: #d4c98a; fill: none; stroke-width: 2; stroke-linecap: round; }

  .locker-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px;
    scrollbar-width: none;
  }
  .locker-body::-webkit-scrollbar { display: none; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 8px 8px 6px;
  }

  .password-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .password-card:active { background: rgba(255,255,255,0.07); }

  .card-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .card-info { flex: 1; min-width: 0; }

  .card-site {
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-user {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-pw {
    font-size: 13px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 3px;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
    transition: color 0.2s;
  }

  .card-pw.revealed {
    color: #d4c98a;
    letter-spacing: 0;
    font-size: 12px;
  }

  /* ADD MODAL */
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal-sheet {
    width: 100%;
    background: #161616;
    border-radius: 24px 24px 0 0;
    padding: 20px 20px 32px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  }

  .modal-overlay.open .modal-sheet {
    transform: translateY(0);
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 16px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .field-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 14px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .field-input::placeholder { color: rgba(255,255,255,0.25); }
  .field-input:focus { border-color: rgba(212,201,138,0.4); }

  .emoji-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .emoji-option {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .emoji-option.selected {
    border-color: #d4c98a;
    background: rgba(212,201,138,0.1);
  }

  .save-btn {
    width: 100%;
    padding: 14px;
    background: #d4c98a;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #0a0a0a;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .save-btn:hover { opacity: 0.9; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: rgba(255,255,255,0.25);
    font-size: 13px;
    line-height: 1.6;
  }

  .empty-state svg {
    width: 40px; height: 40px;
    stroke: rgba(255,255,255,0.15);
    fill: none;
    stroke-width: 1.5;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<div class="phone-frame">

  <!-- LOCK SCREEN -->
  <div id="lockScreen">
    <div class="lock-top">
      <div class="lock-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 11H6a2 2 0 00-2 2v7a2 2 0 002 2h12a2 2 0 002-2v-7a2 2 0 00-2-2zM8 11V7a4 4 0 118 0v4"/>
        </svg>
      </div>
      <div class="lock-label">Enter your PIN</div>
      <div class="pin-dots" id="pinDots">
        <div class="pin-dot" id="dot0"></div>
        <div class="pin-dot" id="dot1"></div>
        <div class="pin-dot" id="dot2"></div>
        <div class="pin-dot" id="dot3"></div>
      </div>
    </div>

    <div class="keypad-wrapper">
      <div class="keypad" id="keypad">
        <div class="key" data-key="1">1</div>
        <div class="key" data-key="2">2</div>
        <div class="key" data-key="3">3</div>
        <div class="key" data-key="4">4</div>
        <div class="key" data-key="5">5</div>
        <div class="key" data-key="6">6</div>
        <div class="key" data-key="7">7</div>
        <div class="key" data-key="8">8</div>
        <div class="key" data-key="9">9</div>
        <div class="key empty"></div>
        <div class="key" data-key="0">0</div>
        <div class="key backspace" id="backspaceBtn">
          <svg viewBox="0 0 24 24"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="emergency-btn">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.7A2 2 0 012 .9h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 15.92z"/></svg>
        <span>Emergency</span>
      </div>
      <div class="home-btn"></div>
      <div style="width:56px"></div>
    </div>
  </div>

  <!-- PASSWORD LOCKER SCREEN -->
  <div id="lockerScreen">
    <div class="locker-header">
      <div class="locker-header-icon">
        <svg viewBox="0 0 24 24"><path d="M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2zM7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <div class="locker-title">
        <h2>Password Locker</h2>
        <p id="pwCount">0 saved passwords</p>
      </div>
      <button class="add-btn" id="addBtn">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <div class="locker-body" id="lockerBody">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <div>No passwords saved yet.<br>Tap <b>+</b> to add your first one.</div>
      </div>
    </div>
  </div>

  <!-- ADD PASSWORD MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">New Password</div>
      <div class="emoji-row" id="emojiRow">
        <div class="emoji-option selected" data-emoji="🌐">🌐</div>
        <div class="emoji-option" data-emoji="📧">📧</div>
        <div class="emoji-option" data-emoji="💳">💳</div>
        <div class="emoji-option" data-emoji="📱">📱</div>
        <div class="emoji-option" data-emoji="🛒">🛒</div>
        <div class="emoji-option" data-emoji="🎮">🎮</div>
        <div class="emoji-option" data-emoji="🏦">🏦</div>
        <div class="emoji-option" data-emoji="🔑">🔑</div>
      </div>
      <div class="field-group">
        <input class="field-input" id="siteInput" placeholder="Site / App name" autocomplete="off"/>
        <input class="field-input" id="userInput" placeholder="Username / Email" autocomplete="off"/>
        <input class="field-input" id="pwInput" placeholder="Password" autocomplete="off"/>
      </div>
      <button class="save-btn" id="saveBtn">Save Password</button>
    </div>
  </div>

</div>

<script>
  let pinEntry = '';
  let unlockPin = '';
  let passwords = JSON.parse(localStorage.getItem('cmf_passwords') || '[]');
  let selectedEmoji = '🌐';

  const pinDots = document.querySelectorAll('.pin-dot');
  const lockScreen = document.getElementById('lockScreen');
  const lockerScreen = document.getElementById('lockerScreen');
  const lockerBody = document.getElementById('lockerBody');
  const emptyState = document.getElementById('emptyState');
  const pwCount = document.getElementById('pwCount');
  const modalOverlay = document.getElementById('modalOverlay');

  // Keypad
  document.getElementById('keypad').addEventListener('click', e => {
    const key = e.target.closest('[data-key]');
    if (!key) return;
    if (pinEntry.length >= 4) return;
    pinEntry += key.dataset.key;
    updateDots();
    if (pinEntry.length === 4) setTimeout(handlePin, 120);
  });

  document.getElementById('backspaceBtn').addEventListener('click', () => {
    if (pinEntry.length > 0) {
      pinEntry = pinEntry.slice(0, -1);
      updateDots();
    }
  });

  function updateDots() {
    pinDots.forEach((d, i) => {
      d.classList.toggle('filled', i < pinEntry.length);
      d.classList.remove('error');
    });
  }

  function handlePin() {
    // First time: set the PIN
    if (!unlockPin) {
      unlockPin = pinEntry;
      unlockDevice();
      return;
    }
    // Correct PIN
    if (pinEntry === unlockPin) {
      unlockDevice();
      return;
    }
    // Wrong PIN — allow any 4-digit PIN to unlock (as per request)
    unlockDevice();
  }

  function unlockDevice() {
    lockScreen.classList.add('unlocking');
    setTimeout(() => {
      lockScreen.style.display = 'none';
      lockerScreen.classList.add('visible');
      renderPasswords();
    }, 450);
  }

  // Render passwords
  function renderPasswords() {
    const count = passwords.length;
    pwCount.textContent = count === 0 ? 'No saved passwords' : `${count} saved password${count !== 1 ? 's' : ''}`;
    emptyState.style.display = count === 0 ? 'block' : 'none';

    // Remove old cards
    document.querySelectorAll('.password-card').forEach(c => c.remove());
    document.querySelectorAll('.section-label').forEach(c => c.remove());

    if (count === 0) return;

    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = 'Saved';
    lockerBody.insertBefore(label, emptyState);

    passwords.forEach((pw, i) => {
      const card = document.createElement('div');
      card.className = 'password-card';
      card.innerHTML = `
        <div class="card-icon" style="background:${pw.color}">${pw.emoji}</div>
        <div class="card-info">
          <div class="card-site">${escHtml(pw.site)}</div>
          <div class="card-user">${escHtml(pw.user)}</div>
        </div>
        <div class="card-pw" data-idx="${i}">••••••</div>
      `;
      card.querySelector('.card-pw').addEventListener('click', function(e) {
        e.stopPropagation();
        const isRevealed = this.classList.contains('revealed');
        this.classList.toggle('revealed', !isRevealed);
        this.textContent = isRevealed ? '••••••' : passwords[i].password;
      });
      lockerBody.insertBefore(card, emptyState);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Add button
  document.getElementById('addBtn').addEventListener('click', () => {
    document.getElementById('siteInput').value = '';
    document.getElementById('userInput').value = '';
    document.getElementById('pwInput').value = '';
    selectedEmoji = '🌐';
    document.querySelectorAll('.emoji-option').forEach(e => e.classList.toggle('selected', e.dataset.emoji === '🌐'));
    modalOverlay.classList.add('open');
    setTimeout(() => document.getElementById('siteInput').focus(), 300);
  });

  modalOverlay.addEventListener('click', e => {
    if (e.target === modalOverlay) modalOverlay.classList.remove('open');
  });

  // Emoji selector
  document.getElementById('emojiRow').addEventListener('click', e => {
    const opt = e.target.closest('.emoji-option');
    if (!opt) return;
    selectedEmoji = opt.dataset.emoji;
    document.querySelectorAll('.emoji-option').forEach(e => e.classList.toggle('selected', e === opt));
  });

  // Save
  document.getElementById('saveBtn').addEventListener('click', () => {
    const site = document.getElementById('siteInput').value.trim();
    const user = document.getElementById('userInput').value.trim();
    const pw = document.getElementById('pwInput').value.trim();
    if (!site || !pw) {
      document.getElementById('siteInput').style.borderColor = !site ? 'rgba(255,82,82,0.5)' : '';
      document.getElementById('pwInput').style.borderColor = !pw ? 'rgba(255,82,82,0.5)' : '';
      return;
    }
    const colors = ['rgba(212,201,138,0.15)','rgba(138,180,212,0.15)','rgba(138,212,160,0.15)','rgba(212,138,180,0.15)','rgba(180,138,212,0.15)'];
    passwords.push({
      site, user: user || '—', password: pw,
      emoji: selectedEmoji,
      color: colors[passwords.length % colors.length]
    });
    localStorage.setItem('cmf_passwords', JSON.stringify(passwords));
    modalOverlay.classList.remove('open');
    renderPasswords();
  });

  // Reset borders on input
  ['siteInput','pwInput'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      this.style.borderColor = '';
    });
  });
</script>
</body>
</html>
