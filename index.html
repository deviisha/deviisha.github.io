<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMF OS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --nothing-bg: #000000;
            --nothing-white: #ffffff;
            --surface: #0a0a0a; /* Subtle differentiation for button background */
            --size: 75px; /* Size of the number buttons */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Fix blue highlight */
            user-select: none; /* No text selecting */
        }

        body {
            background-color: var(--nothing-bg);
            color: var(--nothing-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.01em; /* Subtle aesthetic compression */
        }

        /* Container for the whole mobile interface */
        #phone-display {
            width: 100%;
            max-width: 420px;
            height: 100%;
            padding: 80px 20px 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Important for alignment */
            align-items: center;
        }

        /* Lock Icon & Status */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .header img {
            width: 20px;
            opacity: 0.8;
        }

        .header p {
            font-size: 14px;
            font-weight: 200;
            color: #888;
            margin: 0;
        }

        /* Numpad Section */
        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            justify-items: center;
            max-width: 320px;
            margin: 0 auto;
        }

        /* Base Button Style */
        .btn {
            width: var(--size);
            height: var(--size);
            border: none;
            border-radius: 50%;
            background: transparent; /* No visible background until active */
            color: var(--nothing-white);
            font-size: 32px;
            font-weight: 200;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s;
        }

        /* Transparent Special Buttons (DEL, Emergency) */
        .btn-trans {
            font-weight: 200;
            background: transparent !important;
        }

        /* Active/Pressed State with subtle background */
        .btn:active {
            background: #151515;
            transform: scale(0.92);
        }

        /* Bottom Control Section */
        .bottom-section {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        .emergency-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #888;
            cursor: pointer;
            text-align: center;
        }

        .emergency-btn:active {
            color: var(--nothing-white);
        }

        /* CMF Fingerprint Icon Placeholder */
        .fingerprint-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #333; /* Dark ring */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="phone-display">
        
        <div class="header">
            <svg style="width:24px;height:24px" viewBox="0 0 24 24">
                <path fill="#ffffff" fill-opacity="0.8" d="M12,17A2,2 0 0,0 14,15C14,13.89 13.1,13 12,13A2,2 0 0,0 10,15A2,2 0 0,0 12,17M18,8A2,2 0 0,1 20,10V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V10C4,8.89 4.9,8 6,8H7V6A5,5 0 0,1 12,1A5,5 0 0,1 17,6V8H18M12,3A3,3 0 0,0 9,6V8H15V6A3,3 0 0,0 12,3Z" />
            </svg>
            <p id="status">Enter your PIN</p>
        </div>

        <div class="numpad-grid">
            <button class="btn" onclick="press('1')">1</button>
            <button class="btn" onclick="press('2')">2</button>
            <button class="btn" onclick="press('3')">3</button>
            <button class="btn" onclick="press('4')">4</button>
            <button class="btn" onclick="press('5')">5</button>
            <button class="btn" onclick="press('6')">6</button>
            <button class="btn" onclick="press('7')">7</button>
            <button class="btn" onclick="press('8')">8</button>
            <button class="btn" onclick="press('9')">9</button>
            <div class="btn btn-trans"></div>
            <button class="btn" onclick="press('0')">0</button>
            <button class="btn btn-trans" onclick="del()">
                <svg style="width:30px;height:30px;opacity:0.6;" viewBox="0 0 24 24">
                    <path fill="#ffffff" d="M19,4H7C5.9,4 5,4.9 5,6V10H3V12H5V16C5,17.1 5.9,18 7,18H19C20.1,18 21,17.1 21,16V6C21,4.9 20.1,4 19,4M19,16H7V6H19V16M11,8H13V10H11V8M15,10V8H17V10H15M15,14H17V16H15V14M11,16V14H13V16H11Z" />
                </svg>
            </button>
        </div>

        <div class="bottom-section">
            <div class="emergency-btn">
                <svg style="width:24px;height:24px" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M11,21H13V18.12L15.63,19.64L16.63,17.9L14,16.38L16.63,14.86L15.63,13.12L13,14.63V11.77H11V14.63L8.37,13.11L7.37,14.85L10,16.37L7.37,17.89L8.37,19.63L11,18.11M12,2L1,12L3,14H21L23,12Z" />
                </svg>
                <span style="font-size: 10px; margin-top: 5px; font-weight: 200;">Emergency</span>
            </div>
            
            <div class="fingerprint-circle"></div>
            
            <div style="width:24px; visibility:hidden"></div>
        </div>
    </div>

    <script>
        let input = "";
        const savedPin = "1997"; // The required PIN
        const statusEl = document.getElementById('status');

        function press(num) {
            if (input.length < 4) {
                if (window.navigator.vibrate) window.navigator.vibrate(20);
                input += num;
                // Since this exact look doesn't show dots, we can use a console log for verification
                // console.log("Current input: " + input);
                if (input.length === 4) setTimeout(validate, 400);
            }
        }

        function validate() {
            if (input === savedPin) {
                statusEl.innerText = "UNLOCKED";
                statusEl.style.color = "#4CAF50";
                setTimeout(() => location.reload(), 800);
            } else {
                if (window.navigator.vibrate) window.navigator.vibrate([60, 60]);
                statusEl.innerText = "Wrong PIN";
                statusEl.style.color = "#ff3131";
                setTimeout(() => {
                    input = "";
                    statusEl.innerText = "Enter your PIN";
                    statusEl.style.color = "#888";
                }, 1000);
            }
        }

        function del() {
            input = input.slice(0, -1);
            if (window.navigator.vibrate) window.navigator.vibrate(20);
        }
    </script>
</body>
</html>
