<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMF OS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --surface: #121212;
            --accent: #ff5e00; /* CMF Orange */
            --text: #ffffff;
            --error: #ff3131;
            --btn-size: 80px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container for the whole screen */
        .phone-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Pushes content to top and bottom */
            padding: 80px 20px 60px 20px;
        }

        /* Top Section: Status and Dots */
        .top-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .status-text {
            font-family: 'Major Mono Display', monospace;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888;
            height: 20px;
            transition: color 0.3s ease;
        }

        .dots-wrapper {
            display: flex;
            gap: 24px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border: 2px solid #333;
            border-radius: 50%;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dot.filled {
            background-color: var(--text);
            border-color: var(--text);
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* Bottom Section: Keypad */
        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            justify-items: center;
            align-items: center;
        }

        .btn {
            width: var(--btn-size);
            height: var(--btn-size);
            border-radius: 50%;
            border: none;
            background: var(--surface);
            color: var(--text);
            font-size: 28px;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
        }

        .btn:active {
            background: #222;
            transform: scale(0.9);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .btn-special {
            font-size: 10px;
            font-family: 'Major Mono Display';
            letter-spacing: 1px;
            color: #666;
            background: transparent;
        }

        .btn-special:active {
            background: transparent;
            color: var(--text);
        }

        /* Animations */
        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake { animation: errorShake 0.4s ease-in-out; }

        /* Hidden Home Screen */
        #home {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="phone-container" id="lock-screen">
        <div class="top-section">
            <div class="status-text" id="status">INIT...</div>
            <div class="dots-wrapper" id="dots-container">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="keypad-grid">
            <button class="btn" onclick="press('1')">1</button>
            <button class="btn" onclick="press('2')">2</button>
            <button class="btn" onclick="press('3')">3</button>
            <button class="btn" onclick="press('4')">4</button>
            <button class="btn" onclick="press('5')">5</button>
            <button class="btn" onclick="press('6')">6</button>
            <button class="btn" onclick="press('7')">7</button>
            <button class="btn" onclick="press('8')">8</button>
            <button class="btn" onclick="press('9')">9</button>
            <button class="btn btn-special" onclick="reset()">RESET</button>
            <button class="btn" onclick="press('0')">0</button>
            <button class="btn btn-special" onclick="del()">DEL</button>
        </div>
    </div>

    <div id="home">
        <h1 style="font-family: 'Major Mono Display'; color: var(--accent); font-size: 3rem;">19:97</h1>
        <p style="letter-spacing: 5px; opacity: 0.5;">SYSTEM READY</p>
        <div style="margin-top: 50px; cursor: pointer;" onclick="location.reload()">[ LOCK ]</div>
    </div>

    <script>
        let input = "";
        let mode = "CHECK"; // SET, CONFIRM, CHECK
        let temp = "";
        
        const statusEl = document.getElementById('status');
        const dots = document.querySelectorAll('.dot');
        const container = document.getElementById('dots-container');

        // Logic to check memory on start
        window.onload = () => {
            const saved = localStorage.getItem('pin');
            if (!saved) {
                mode = "SET";
                statusEl.innerText = "CREATE PIN";
            } else {
                mode = "CHECK";
                statusEl.innerText = "ENTER PIN";
            }
        };

        function press(num) {
            if (input.length < 4) {
                if (window.navigator.vibrate) window.navigator.vibrate(10);
                input += num;
                updateDots();
                if (input.length === 4) setTimeout(process, 300);
            }
        }

        function updateDots() {
            dots.forEach((d, i) => d.classList.toggle('filled', i < input.length));
        }

        function process() {
            const saved = localStorage.getItem('pin');

            if (mode === "SET") {
                temp = input;
                input = "";
                updateDots();
                mode = "CONFIRM";
                statusEl.innerText = "CONFIRM PIN";
                statusEl.style.color = "var(--accent)";
            } 
            else if (mode === "CONFIRM") {
                if (input === temp) {
                    localStorage.setItem('pin', input);
                    statusEl.innerText = "PIN SAVED";
                    setTimeout(() => location.reload(), 1000);
                } else {
                    fail("MISMATCH");
                    mode = "SET";
                }
            } 
            else {
                if (input === saved) {
                    unlock();
                } else {
                    fail("WRONG PIN");
                }
            }
        }

        function fail(msg) {
            container.classList.add('shake');
            statusEl.innerText = msg;
            statusEl.style.color = "var(--error)";
            if (window.navigator.vibrate) window.navigator.vibrate([50, 50]);
            
            setTimeout(() => {
                input = "";
                updateDots();
                container.classList.remove('shake');
                statusEl.innerText = (mode === "CHECK") ? "ENTER PIN" : "CREATE PIN";
                statusEl.style.color = "#888";
            }, 800);
        }

        function unlock() {
            statusEl.innerText = "UNLOCKED";
            statusEl.style.color = "#4CAF50";
            setTimeout(() => {
                document.getElementById('lock-screen').style.display = "none";
                document.getElementById('home').style.display = "flex";
            }, 400);
        }

        function del() {
            input = input.slice(0, -1);
            updateDots();
        }

        function reset() {
            if(confirm("Factory Reset?")) {
                localStorage.removeItem('pin');
                location.reload();
            }
        }
    </script>
</body>
</html>
