<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMF Passcode Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --nothing-white: #ffffff;
            --nothing-grey: #1a1a1a;
            --nothing-red: #ff3131;
            --nothing-bg: #000000;
            --cmf-orange: #ff5e00;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            background-color: var(--nothing-bg);
            color: var(--nothing-white);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        .header-text {
            font-family: 'Major Mono Display', monospace;
            font-size: 1rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-align: center;
            min-height: 1.5em;
        }

        .dots-wrapper {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border: 2px solid #333;
            border-radius: 50%;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .dot.filled {
            background-color: var(--nothing-white);
            border-color: var(--nothing-white);
            transform: scale(1.3);
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 20px;
        }

        .btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            background: var(--nothing-grey);
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.2s;
            touch-action: manipulation;
        }

        .btn:active {
            background: #333;
            transform: scale(0.9);
            box-shadow: 0 0 15px rgba(255, 94, 0, 0.2);
        }

        .btn-del { 
            font-size: 11px; 
            color: #666; 
            background: transparent;
        }

        .btn-empty { visibility: hidden; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .error-shake { animation: shake 0.3s ease-in-out; }

        #home-screen {
            display: none;
            opacity: 0;
            text-align: center;
            transition: opacity 0.5s ease;
        }

        .reset-link {
            margin-top: 30px;
            font-size: 10px;
            color: #444;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="header-text" id="status">INITIALIZING...</div>

        <div class="dots-wrapper" id="dots-container">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="numpad">
            <button class="btn" onclick="addNumber('1')">1</button>
            <button class="btn" onclick="addNumber('2')">2</button>
            <button class="btn" onclick="addNumber('3')">3</button>
            <button class="btn" onclick="addNumber('4')">4</button>
            <button class="btn" onclick="addNumber('5')">5</button>
            <button class="btn" onclick="addNumber('6')">6</button>
            <button class="btn" onclick="addNumber('7')">7</button>
            <button class="btn" onclick="addNumber('8')">8</button>
            <button class="btn" onclick="addNumber('9')">9</button>
            <div class="btn-empty"></div>
            <button class="btn" onclick="addNumber('0')">0</button>
            <button class="btn btn-del" onclick="backspace()">DEL</button>
        </div>

        <center><div class="reset-link" onclick="resetSystem()">RESET SYSTEM</div></center>
    </div>

    <div id="home-screen">
        <h1 style="font-family: 'Major Mono Display'; color: var(--cmf-orange);">UNLOCKED</h1>
        <p>Welcome to CMF OS</p>
        <button class="btn" style="margin: 20px auto;" onclick="location.reload()">LOCK</button>
    </div>

    <script>
        let currentInput = "";
        let step = "CHECK"; // States: CHECK, SET, CONFIRM
        let tempPin = "";
        
        const statusEl = document.getElementById('status');
        const dotEls = document.querySelectorAll('.dot');
        const containerEl = document.getElementById('dots-container');

        // On Load: Check if a PIN already exists in memory
        window.onload = () => {
            const savedPin = localStorage.getItem('cmf_pin');
            if (!savedPin) {
                step = "SET";
                statusEl.innerText = "CREATE NEW PIN";
            } else {
                step = "CHECK";
                statusEl.innerText = "ENTER PIN";
            }
        };

        function addNumber(num) {
            if (currentInput.length < 4) {
                if (window.navigator.vibrate) window.navigator.vibrate(10);
                currentInput += num;
                render();
                if (currentInput.length === 4) setTimeout(processInput, 300);
            }
        }

        function render() {
            dotEls.forEach((dot, i) => dot.classList.toggle('filled', i < currentInput.length));
        }

        function processInput() {
            const savedPin = localStorage.getItem('cmf_pin');

            if (step === "SET") {
                // First step of saving a new PIN
                tempPin = currentInput;
                currentInput = "";
                render();
                step = "CONFIRM";
                statusEl.innerText = "CONFIRM PIN";
                statusEl.style.color = var(--cmf-orange);
            } 
            else if (step === "CONFIRM") {
                // Confirming the new PIN
                if (currentInput === tempPin) {
                    localStorage.setItem('cmf_pin', currentInput);
                    statusEl.innerText = "PIN SAVED";
                    setTimeout(() => location.reload(), 800);
                } else {
                    errorEffect("MISMATCH");
                    step = "SET";
                    setTimeout(() => statusEl.innerText = "CREATE NEW PIN", 800);
                }
            } 
            else if (step === "CHECK") {
                // Standard unlock check
                if (currentInput === savedPin) {
                    unlock();
                } else {
                    errorEffect("WRONG PIN");
                }
            }
        }

        function errorEffect(msg) {
            containerEl.classList.add('error-shake');
            statusEl.innerText = msg;
            statusEl.style.color = "var(--nothing-red)";
            if (window.navigator.vibrate) window.navigator.vibrate([50, 50, 50]);
            
            setTimeout(() => {
                currentInput = "";
                render();
                containerEl.classList.remove('error-shake');
                statusEl.innerText = (step === "CHECK") ? "ENTER PIN" : "CREATE PIN";
                statusEl.style.color = "white";
            }, 800);
        }

        function unlock() {
            statusEl.innerText = "ACCESS GRANTED";
            statusEl.style.color = "#4CAF50";
            setTimeout(() => {
                document.getElementById('lock-screen').style.display = "none";
                document.getElementById('home-screen').style.display = "block";
                setTimeout(() => document.getElementById('home-screen').style.opacity = "1", 50);
            }, 500);
        }

        function backspace() {
            currentInput = currentInput.slice(0, -1);
            render();
        }

        function resetSystem() {
            if(confirm("Delete saved PIN and restart?")) {
                localStorage.removeItem('cmf_pin');
                location.reload();
            }
        }
    </script>
</body>
</html>
